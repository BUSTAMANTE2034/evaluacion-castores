spring.application.name=backend
# Conexión a base de datos MySQL (url, usuario y contraseña)
# La URL de conexión incluye el nombre de la base de datos "inventario_castores" y el puerto 3306, que es el puerto predeterminado para MySQL.
spring.datasource.url=jdbc:mysql://localhost:3306/inventario_castores
spring.datasource.username=root
spring.datasource.password=Carbus600.

# Configuración de JPA/Hibernate para la gestión de entidades y esquemas de la base de datos
# El valor "update" permite que Hibernate actualice el esquema de la base de datos automáticamente según las entidades definidas en el código.
# El valor "show-sql" habilita la impresión de las consultas SQL generadas por Hibernate en la consola, lo que es útil para depuración.
# El valor "hibernate.dialect" especifica el dialecto de SQL que Hibernate debe usar para generar las consultas, en este caso, para MySQL 8.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# JWT (JwtUtil)
jwt.secret=MySuperSecretKeyThatIsAtLeast32CharactersLong123
jwt.expiration=86400000  

# Configuración del puerto del servidor
server.port=8080
server.servlet.context-path=/api

# Configuración de logging para depuración
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG

